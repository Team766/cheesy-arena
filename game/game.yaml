game:
  name: "My Custom Game"

fouls:
  minor_foul_points: 2
  major_foul_points: 6

# game_pieces: Declare the game pieces used in scoring_counts.
game_pieces:
  - id: game_piece_1
    display_name: "Game Piece 1"
  - id: game_piece_2
    display_name: "Game Piece 2"

# scoring_counts: Auto/teleop counter elements.
# phase: auto | teleop | both
# For phase: both, use points_auto + points_teleop.
# For phase: auto or teleop, use points (shorthand) or points_auto/points_teleop.
scoring_counts:
  - id: gp1_level1
    display_name: "Game Piece 1 (Level 1)"
    game_piece: game_piece_1
    phase: both
    points_auto: 5
    points_teleop: 3

  - id: gp1_level2
    display_name: "Game Piece 1 (Level 2)"
    game_piece: game_piece_1
    phase: both
    points_auto: 3
    points_teleop: 1

  - id: gp2
    display_name: "Game Piece 2"
    game_piece: game_piece_2
    phase: both
    points_auto: 4
    points_teleop: 2

# endgame_counts: Endgame counter elements (phase always endgame).
endgame_counts: []

# statuses: Per-robot statuses (3 robots per alliance).
# No 'values' field (or values: bool): generates [3]bool with a single 'points' value.
# With 'values' as a list: generates a typed enum ([3]{ID}Status) with per-state points.
statuses:
  - id: leave
    display_name: "Leave"
    phase: auto
    points: 3

  - id: park
    display_name: "Park"
    phase: endgame
    points: 2

# ranking_points: Custom RP bonus conditions.
# logic_func must be implemented in game/custom_scoring_logic.go.
ranking_points:
  - id: auton_rp
    display_name: "Auton Bonus"
    logic_func: "ComputeAutonRP"

  - id: scoring_rp
    display_name: "Scoring Bonus"
    logic_func: "ComputeScoringRP"

  - id: endgame_rp
    display_name: "Endgame Bonus"
    logic_func: "ComputeEndgameRP"

# ranking_tiebreakers: Drives RankingFields struct fields and Less() sort.
# Applies after RankingPoints/Played.
ranking_tiebreakers:
  - metric: total_points
  - metric: auto_points

# playoff_tiebreakers: Drives DetermineMatchStatus() cascade for tied playoff matches.
# Opponent major fouls are always first (implicit — don't list here).
playoff_tiebreakers:
  - metric: auto_points
  - metric: total_points
